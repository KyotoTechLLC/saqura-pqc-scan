name: 'SaQura PQC Scan'
description: 'Find quantum-vulnerable cryptography (RSA, ECC, DH) in your code & dependencies. Outputs a CycloneDX CBOM and a quantum-readiness report.'
author: 'KyotoTech LLC'

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  path:
    description: 'Directory to scan (relative to the workspace).'
    required: false
    default: '.'
  cbom-path:
    description: 'Where to write the CycloneDX CBOM JSON (empty to skip).'
    required: false
    default: 'cbom.json'
  report-path:
    description: 'Where to write the Markdown report (empty to skip; summary is always written).'
    required: false
    default: ''
  badge-path:
    description: 'Where to write a shields.io-style badge JSON (empty to skip).'
    required: false
    default: ''
  fail-on:
    description: "Fail the job when findings reach a level: none | vulnerable | broken | any."
    required: false
    default: 'none'
  comment-on-pr:
    description: 'Post/update a report comment on the pull request (true/false). Needs pull-requests: write.'
    required: false
    default: 'false'
  token:
    description: 'GitHub token used for the PR comment.'
    required: false
    default: ${{ github.token }}

outputs:
  score:
    description: 'Quantum-readiness score (0-100), or empty if no crypto detected.'
  vulnerable-count:
    description: 'Number of quantum-vulnerable findings.'
  broken-count:
    description: 'Number of broken/weak findings.'
  cbom-path:
    description: 'Path to the written CBOM file.'

runs:
  using: 'node20'
  main: 'src/action.js'
